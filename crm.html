<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BottegAI — Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070d;--bg2:#0d0d15;--bg3:#13131d;--bg4:#191924;
  --card:#0f0f19;--card-hover:#141420;
  --border:rgba(255,255,255,0.055);--border2:rgba(255,255,255,0.09);--border3:rgba(255,255,255,0.14);
  --accent:#8166ff;--accent2:#a690ff;--accent-dim:rgba(129,102,255,0.1);--accent-glow:rgba(129,102,255,0.18);
  --text:#e8e8f0;--text2:#c8c8d8;--muted:#6e6e82;--muted2:#4a4a5c;
  --green:#2dd4a0;--green-bg:rgba(45,212,160,0.08);--green-b:rgba(45,212,160,0.18);
  --amber:#f5a623;--amber-bg:rgba(245,166,35,0.08);--amber-b:rgba(245,166,35,0.18);
  --red:#f06060;--red-bg:rgba(240,96,96,0.08);--red-b:rgba(240,96,96,0.18);
  --blue:#5b9eff;--blue-bg:rgba(91,158,255,0.08);--blue-b:rgba(91,158,255,0.18);
  --purple:#b07aff;--purple-bg:rgba(176,122,255,0.08);--purple-b:rgba(176,122,255,0.18);
  --r:12px;--rs:8px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100dvh;-webkit-font-smoothing:antialiased}

/* === TOPBAR === */
.topbar{position:sticky;top:0;z-index:100;background:rgba(7,7,13,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1rem;height:48px}
.topbar-brand{font-size:.95rem;font-weight:800;letter-spacing:-.04em;flex:1;color:var(--text)}
.topbar-brand b{color:var(--accent2)}
.topbar-right{display:flex;align-items:center;gap:.6rem}
.sync-indicator{display:flex;align-items:center;gap:5px;font-size:.65rem;color:var(--muted);font-weight:500}
.sync-dot{width:5px;height:5px;border-radius:50%}
.sync-dot.on{background:var(--green);box-shadow:0 0 6px rgba(45,212,160,0.5)}
.sync-dot.off{background:var(--muted2)}
.sync-dot.working{background:var(--amber);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.icon-btn{width:30px;height:30px;border-radius:var(--rs);background:transparent;border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.icon-btn:hover{background:var(--accent-dim);color:var(--accent2);border-color:var(--accent-glow)}
.icon-btn svg{width:15px;height:15px}

/* === TABS === */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:.55rem 1rem;font-size:.75rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:6px}
.tab svg{width:14px;height:14px;opacity:.5}
.tab:hover{color:var(--text)}
.tab:hover svg{opacity:.8}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.tab.active svg{opacity:1;color:var(--accent2)}

/* === SHARED === */
.view{position:relative}
.section-pad{padding:1rem}
.btn{padding:.45rem .9rem;border-radius:var(--rs);font-size:.75rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#7258e6;transform:translateY(-1px)}
.btn-sm{padding:.3rem .6rem;font-size:.7rem}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--accent2);border-color:var(--accent-glow)}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red-b)}
.btn-danger:hover{background:var(--red-bg)}

/* === STATS === */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:1rem}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.8rem .6rem;text-align:center;transition:all .2s}
.stat:hover{border-color:var(--border2)}
.stat-val{font-size:1.6rem;font-weight:800;letter-spacing:-.03em;line-height:1}
.stat-lbl{font-size:.62rem;color:var(--muted);margin-top:.25rem;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.stat.s1 .stat-val{color:var(--accent2)}
.stat.s2 .stat-val{color:var(--blue)}
.stat.s3 .stat-val{color:var(--amber)}
.stat.s4 .stat-val{color:var(--green)}

/* === PANEL === */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:.7rem;overflow:hidden}
.panel-head{padding:.7rem .9rem;font-size:.78rem;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border)}
.panel-head svg{width:14px;height:14px;color:var(--muted)}
.panel-body{padding:.6rem .9rem}

/* === FUNNEL === */
.funnel-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem}
.funnel-lbl{width:90px;text-align:right;font-size:.68rem;color:var(--muted);font-weight:500;flex-shrink:0}
.funnel-track{flex:1;height:20px;background:var(--bg3);border-radius:6px;overflow:hidden}
.funnel-fill{height:100%;border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;padding-left:8px;font-size:.65rem;font-weight:700;color:#fff}

/* === NEXT ACTIONS === */
.action-row{display:flex;align-items:center;gap:.5rem;padding:.4rem 0;border-bottom:1px solid var(--border);font-size:.78rem}
.action-row:last-child{border-bottom:none}
.action-name{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.action-text{color:var(--muted);font-size:.72rem;flex-shrink:0;max-width:45%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* === PROSPECT CARDS === */
.toolbar{display:flex;gap:.4rem;margin-bottom:.8rem;flex-wrap:wrap}
.toolbar input,.toolbar select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:.42rem .65rem;border-radius:var(--rs);font-size:.78rem;outline:none;font-family:inherit;transition:border-color .15s}
.toolbar input:focus,.toolbar select:focus{border-color:var(--accent)}
.toolbar input{flex:1;min-width:100px}
.prospect-list{display:flex;flex-direction:column;gap:.45rem}

.p-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.8rem .9rem .8rem 1rem;cursor:pointer;transition:all .2s;position:relative}
.p-card::after{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0}
.p-card.st-da_contattare::after{background:var(--muted2)}
.p-card.st-messaggio_inviato::after{background:var(--blue)}
.p-card.st-risposta_ricevuta::after{background:var(--amber)}
.p-card.st-call_fissata::after{background:var(--purple)}
.p-card.st-proposta_inviata::after{background:var(--accent2)}
.p-card.st-cliente::after{background:var(--green)}
.p-card.st-perso::after{background:var(--red)}
.p-card:hover{background:var(--card-hover);border-color:var(--border2)}
.p-card.open{border-color:var(--border3);background:var(--bg4)}
.p-card-name{font-weight:700;font-size:.88rem}
.p-card-tags{display:flex;gap:.3rem;margin-top:.3rem;flex-wrap:wrap}
.tag{font-size:.6rem;font-weight:600;padding:.15rem .5rem;border-radius:999px;border:1px solid}
.tag-sector{background:var(--accent-dim);color:var(--accent2);border-color:rgba(129,102,255,0.12)}
.tag-zone{background:transparent;color:var(--muted);border-color:var(--border2)}
.tag-status{padding:.17rem .55rem;font-size:.62rem}
.ts-da_contattare{background:transparent;color:var(--muted);border-color:var(--border2)}
.ts-messaggio_inviato{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-b)}
.ts-risposta_ricevuta{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-b)}
.ts-call_fissata{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-b)}
.ts-proposta_inviata{background:var(--accent-dim);color:var(--accent2);border-color:var(--accent-glow)}
.ts-cliente{background:var(--green-bg);color:var(--green);border-color:var(--green-b)}
.ts-perso{background:var(--red-bg);color:var(--red);border-color:var(--red-b)}

.p-card-detail{display:none;margin-top:.65rem;padding-top:.65rem;border-top:1px solid var(--border);animation:slideIn .15s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
.p-card.open .p-card-detail{display:block}
.field{display:flex;gap:.4rem;margin-bottom:.35rem;font-size:.78rem}
.field-k{color:var(--muted);width:90px;flex-shrink:0;font-weight:500}
.field-v{color:var(--text2)}
.field-v a{color:inherit;text-decoration:none;border-bottom:1px solid var(--border2);transition:border-color .15s}
.field-v a:hover{border-color:var(--accent2);color:var(--accent2)}
.p-card-actions{display:flex;gap:.35rem;margin-top:.7rem}

.tl{margin-top:.6rem;padding-top:.4rem;border-top:1px solid var(--border)}
.tl-item{display:flex;gap:.4rem;padding:.25rem 0;font-size:.7rem;padding-left:.7rem;border-left:1.5px solid var(--border);margin-left:3px}
.tl-date{color:var(--muted2);width:60px;flex-shrink:0}
.tl-text{color:var(--muted)}

/* === TEMPLATES === */
.tpl-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.9rem;margin-bottom:.55rem;transition:border-color .15s}
.tpl-card:hover{border-color:var(--border2)}
.tpl-title{font-size:.8rem;font-weight:700;margin-bottom:.1rem}
.tpl-sub{font-size:.66rem;color:var(--muted);margin-bottom:.5rem;font-weight:500}
.tpl-body{font-size:.78rem;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:.65rem .8rem;line-height:1.55;white-space:pre-wrap;margin-bottom:.5rem}
.tpl-copy{font-size:.7rem;color:var(--accent2);cursor:pointer;font-weight:600;transition:color .15s;display:inline-flex;align-items:center;gap:4px}
.tpl-copy:hover{color:var(--accent)}
.tpl-copy.ok{color:var(--green)}

/* === TRACKER === */
.todo{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:.6rem .8rem;margin-bottom:.35rem;display:flex;align-items:flex-start;gap:.6rem;transition:border-color .15s}
.todo:hover{border-color:var(--border2)}
.todo-box{width:18px;height:18px;border:1.5px solid var(--border3);border-radius:5px;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.todo-box:hover{border-color:var(--accent)}
.todo-box.done{background:var(--green);border-color:var(--green)}
.todo-box.done::after{content:'';width:6px;height:3px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translate(0,-1px)}
.todo-body{flex:1;min-width:0}
.todo-txt{font-size:.8rem}
.todo-txt.done{text-decoration:line-through;color:var(--muted)}
.todo-date{font-size:.65rem;color:var(--muted2);margin-top:.1rem}

/* === MODAL === */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(3px);z-index:200;display:none;align-items:center;justify-content:center;padding:.8rem}
.overlay.show{display:flex}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:460px;max-height:92dvh;overflow-y:auto;padding:1.3rem;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.modal::-webkit-scrollbar{width:3px}.modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:1rem}
.fg{margin-bottom:.75rem}
.fg label{display:block;font-size:.68rem;font-weight:600;color:var(--muted);margin-bottom:.25rem;letter-spacing:.03em;text-transform:uppercase}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg4);border:1px solid var(--border);color:var(--text);padding:.48rem .65rem;border-radius:var(--rs);font-size:.82rem;outline:none;font-family:inherit;transition:border-color .15s}
.fg textarea{min-height:55px;resize:vertical}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.modal-foot{display:flex;gap:.4rem;justify-content:flex-end;margin-top:1rem}
.settings-note{font-size:.7rem;color:var(--muted2);line-height:1.5;margin-bottom:.8rem}

/* === EMPTY === */
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--muted)}
.empty-state svg{width:40px;height:40px;margin-bottom:.6rem;opacity:.3}
.empty-state p{font-size:.82rem}

@media(max-width:600px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .fg-row{grid-template-columns:1fr}
  .toolbar{flex-direction:column}
  .toolbar input,.toolbar select{width:100%}
  .funnel-lbl{width:70px;font-size:.64rem}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">Botteg<b>AI</b></div>
  <div class="topbar-right">
    <div class="sync-indicator" id="syncStatus"><div class="sync-dot off"></div>Offline</div>
    <div class="icon-btn" onclick="openSettings()" title="Impostazioni">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.32 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </div>
  </div>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-tab="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</div>
  <div class="tab" data-tab="prospects"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Prospect</div>
  <div class="tab" data-tab="templates"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Template</div>
  <div class="tab" data-tab="tracker"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Tracker</div>
</div>

<!-- DASHBOARD -->
<div class="view" id="v-dashboard"><div class="section-pad">
  <div class="stats-row" id="statsGrid"></div>
  <div class="panel"><div class="panel-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Pipeline</div><div class="panel-body" id="funnelBars"></div></div>
  <div class="panel"><div class="panel-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Prossime azioni</div><div class="panel-body" id="nextActions"></div></div>
</div></div>

<!-- PROSPECTS -->
<div class="view" id="v-prospects" style="display:none"><div class="section-pad">
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Cerca attività...">
    <select id="filterSettore"><option value="">Tutti i settori</option></select>
    <select id="filterStato"><option value="">Tutti gli stati</option></select>
    <button class="btn btn-primary" onclick="openModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nuovo</button>
  </div>
  <div class="prospect-list" id="prospectList"></div>
</div></div>

<!-- TEMPLATES -->
<div class="view" id="v-templates" style="display:none"><div class="section-pad" id="templatesList"></div></div>

<!-- TRACKER -->
<div class="view" id="v-tracker" style="display:none"><div class="section-pad">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem">
    <span style="font-size:.88rem;font-weight:700">Azioni</span>
    <button class="btn btn-primary btn-sm" onclick="addTodo()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="11" height="11"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Aggiungi</button>
  </div>
  <div id="todoList"></div>
</div></div>

<!-- PROSPECT MODAL -->
<div class="overlay" id="modal"><div class="modal">
  <div class="modal-title" id="modalTitle">Nuovo Prospect</div>
  <input type="hidden" id="editId">
  <div class="fg"><label>Attività</label><input type="text" id="fName" placeholder="es. Trattoria Da Mario"></div>
  <div class="fg-row">
    <div class="fg"><label>Settore</label><select id="fSettore"><option value="">—</option><option>Ristorante/Bar</option><option>Studio Medico</option><option>Fisioterapista</option><option>Agenzia Immobiliare</option><option>Artigiano/Tecnico</option><option>Studio Legale</option><option>Negozio/Retail</option><option>Palestra/Wellness</option><option>Studio Progettazione</option><option>Altro</option></select></div>
    <div class="fg"><label>Zona</label><select id="fZona"><option value="">—</option><option>Villafranca</option><option>Verona Centro</option><option>Verona Sud</option><option>Verona Nord</option><option>Sommacampagna</option><option>Valeggio</option><option>Peschiera</option><option>Bussolengo</option><option>San Giovanni Lupatoto</option><option>Altro</option></select></div>
  </div>
  <div class="fg"><label>Contatto</label><input type="text" id="fContatto" placeholder="Nome persona di riferimento"></div>
  <div class="fg-row">
    <div class="fg"><label>Telefono / WhatsApp</label><input type="tel" id="fTel" placeholder="+39 ..."></div>
    <div class="fg"><label>Instagram</label><input type="text" id="fIg" placeholder="@..."></div>
  </div>
  <div class="fg"><label>Email</label><input type="email" id="fEmail" placeholder="info@..."></div>
  <div class="fg"><label>Stato</label><select id="fStato"><option value="da_contattare">Da contattare</option><option value="messaggio_inviato">Messaggio inviato</option><option value="risposta_ricevuta">Risposta ricevuta</option><option value="call_fissata">Call fissata</option><option value="proposta_inviata">Proposta inviata</option><option value="cliente">Cliente</option><option value="perso">Perso</option></select></div>
  <div class="fg"><label>Dolore identificato</label><textarea id="fDolore" placeholder="Qual è il problema principale?"></textarea></div>
  <div class="fg"><label>Prossima azione</label><input type="text" id="fAzione" placeholder="es. Mandare DM su Instagram"></div>
  <div class="fg"><label>Note</label><textarea id="fNote" placeholder="Info utili..."></textarea></div>
  <div class="modal-foot">
    <button class="btn btn-ghost" onclick="closeModal()">Annulla</button>
    <button class="btn btn-danger" id="btnDelete" style="display:none" onclick="deleteProspect()">Elimina</button>
    <button class="btn btn-primary" onclick="saveProspect()">Salva</button>
  </div>
</div></div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="settingsModal"><div class="modal" style="max-width:380px">
  <div class="modal-title">Impostazioni</div>
  <p class="settings-note">Collega JSONBin per sincronizzare i dati tra dispositivi. I dati vengono salvati anche in locale sul browser.</p>
  <div class="fg"><label>API Key</label><input type="password" id="cfgApiKey" placeholder="$2a$10$..."></div>
  <div class="fg"><label>Bin ID</label><input type="text" id="cfgBinId" placeholder="6..."></div>
  <div class="modal-foot">
    <button class="btn btn-ghost" onclick="closeSettings()">Chiudi</button>
    <button class="btn btn-ghost" onclick="syncFromRemote()">Scarica dati</button>
    <button class="btn btn-primary" onclick="saveSettingsAndSync()">Salva</button>
  </div>
</div></div>

<script>
let D={prospects:[],todos:[],config:{apiKey:'$2a$10$XUNT7t3ISpGoQlbJH5dvj.TD7qKNtNMeegop2pauFFobzySLbU18i',binId:'69c965fd5fdde57455101c49'}};
const ST={da_contattare:{l:'Da contattare',c:'var(--muted2)'},messaggio_inviato:{l:'Messaggio inviato',c:'var(--blue)'},risposta_ricevuta:{l:'Risposta ricevuta',c:'var(--amber)'},call_fissata:{l:'Call fissata',c:'var(--purple)'},proposta_inviata:{l:'Proposta inviata',c:'var(--accent2)'},cliente:{l:'Cliente',c:'var(--green)'},perso:{l:'Perso',c:'var(--red)'}};
const TPL=[
{s:'Universale',t:'DM Instagram — A (senza AI)',b:`Ciao! Mi chiamo Cristiano, sono un ragazzo della vostra zona, scusate il disturbo.\n\nSto lavorando a un progetto per aiutare attività locali e sto cercando di capire quali sono i problemi veri che vivete ogni giorno.\n\nC'è per caso qualcosa che vi porta via più tempo del dovuto? Un'attività ripetitiva, una gestione che vi frustra, qualcosa che vorreste funzionasse meglio?\n\nAnche una risposta brevissima mi sarebbe di grande aiuto.\n\nBuona giornata!\nCristiano`},
{s:'Universale',t:'DM Instagram — B (con AI)',b:`Ciao! Mi chiamo Cristiano, sono un ragazzo della vostra zona, scusate il disturbo.\n\nSto portando avanti un progetto legato all'intelligenza artificiale per le attività locali e mi piacerebbe capire dai diretti interessati: c'è qualcosa nella gestione quotidiana della vostra attività che vi porta via più tempo del dovuto?\n\nAnche una risposta brevissima mi sarebbe di grande aiuto.\n\nBuona giornata!\nCristiano`},
{s:'Universale',t:'Email — A (senza AI) · Oggetto: Un progetto per le attività locali',b:`Buongiorno,\n\nmi chiamo Cristiano, sono un ragazzo della zona. Scusate se vi scrivo così dal nulla.\n\nSto lavorando a un progetto per aiutare attività locali e sto cercando di capire quali sono i problemi veri che vivete ogni giorno.\n\nC'è per caso qualcosa che vi porta via più tempo del dovuto? Un'attività ripetitiva, una gestione che vi frustra, qualcosa che vorreste funzionasse meglio?\n\nAnche una risposta brevissima mi sarebbe di grande aiuto.\n\nE se invece vi va di parlarne di persona davanti a un caffè, sono a disposizione, nessun impegno, solo una chiacchierata.\n\nGrazie per il vostro tempo,\nCristiano`},
{s:'Universale',t:"Email — B (con AI) · Oggetto: Un progetto con l'AI per le attività locali",b:`Buongiorno,\n\nmi chiamo Cristiano, sono un ragazzo della zona. Scusate se vi scrivo così dal nulla.\n\nSto portando avanti un progetto legato all'intelligenza artificiale per le attività locali e mi piacerebbe capire dai diretti interessati: c'è qualcosa nella gestione quotidiana della vostra attività che vi porta via più tempo del dovuto?\n\nAnche una risposta brevissima mi sarebbe di grande aiuto.\n\nE se invece vi va di parlarne di persona davanti a un caffè, sono a disposizione, nessun impegno, solo una chiacchierata.\n\nGrazie per il vostro tempo,\nCristiano`}];

function load(){try{const s=localStorage.getItem('bottegai_crm');if(s)D={...D,...JSON.parse(s)}}catch(e){}document.getElementById('cfgApiKey').value=D.config.apiKey||'';document.getElementById('cfgBinId').value=D.config.binId||''}
function persist(){localStorage.setItem('bottegai_crm',JSON.stringify(D))}
function saveSettingsAndSync(){D.config.apiKey=document.getElementById('cfgApiKey').value.trim();D.config.binId=document.getElementById('cfgBinId').value.trim();persist();syncUI();push();closeSettings()}
function ss(c,t){document.getElementById('syncStatus').innerHTML=`<div class="sync-dot ${c}"></div>${t}`}
function syncUI(){ss(D.config.apiKey&&D.config.binId?'on':'off',D.config.apiKey&&D.config.binId?'Connesso':'Offline')}
async function push(){if(!D.config.apiKey||!D.config.binId)return;ss('working','Sync...');try{await fetch(`https://api.jsonbin.io/v3/b/${D.config.binId}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':D.config.apiKey},body:JSON.stringify({prospects:D.prospects,todos:D.todos})});ss('on','Salvato');setTimeout(syncUI,2500)}catch(e){ss('off','Errore')}}
async function syncFromRemote(){if(!D.config.apiKey||!D.config.binId)return alert('Configura JSONBin nelle impostazioni');ss('working','Download...');try{const r=await fetch(`https://api.jsonbin.io/v3/b/${D.config.binId}/latest`,{headers:{'X-Master-Key':D.config.apiKey}});const j=await r.json();if(j.record){if(j.record.prospects)D.prospects=j.record.prospects;if(j.record.todos)D.todos=j.record.todos;persist();renderAll()}ss('on','Sincronizzato')}catch(e){ss('off','Errore')}}
function save(){persist();push()}
function openSettings(){document.getElementById('settingsModal').classList.add('show')}
function closeSettings(){document.getElementById('settingsModal').classList.remove('show')}

document.getElementById('tabs').addEventListener('click',e=>{const t=e.target.closest('.tab');if(!t)return;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.view').forEach(v=>v.style.display='none');t.classList.add('active');document.getElementById('v-'+t.dataset.tab).style.display='block'});

function renderDash(){const p=D.prospects,c={};Object.keys(ST).forEach(k=>c[k]=0);p.forEach(x=>{if(c[x.stato]!==undefined)c[x.stato]++});const t=p.length;
document.getElementById('statsGrid').innerHTML=`<div class="stat s1"><div class="stat-val">${t}</div><div class="stat-lbl">Prospect</div></div><div class="stat s2"><div class="stat-val">${c.messaggio_inviato}</div><div class="stat-lbl">Inviati</div></div><div class="stat s3"><div class="stat-val">${c.risposta_ricevuta+c.call_fissata}</div><div class="stat-lbl">Risposte</div></div><div class="stat s4"><div class="stat-val">${c.cliente}</div><div class="stat-lbl">Clienti</div></div>`;
const stages=['da_contattare','messaggio_inviato','risposta_ricevuta','call_fissata','proposta_inviata','cliente'];
document.getElementById('funnelBars').innerHTML=stages.map(s=>{const pct=t>0?(c[s]/t*100):0;const w=Math.max(pct,c[s]>0?8:0);return`<div class="funnel-row"><div class="funnel-lbl">${ST[s].l}</div><div class="funnel-track"><div class="funnel-fill" style="width:${w}%;background:${ST[s].c}">${c[s]}</div></div></div>`}).join('');
const a=p.filter(x=>x.azione&&x.stato!=='cliente'&&x.stato!=='perso');
document.getElementById('nextActions').innerHTML=a.length?a.slice(0,8).map(x=>`<div class="action-row"><span class="tag tag-status ts-${x.stato}">${ST[x.stato]?.l||x.stato}</span><span class="action-name">${x.name}</span><span class="action-text">${x.azione}</span></div>`).join(''):'<div class="empty-state" style="padding:1.2rem"><p>Nessuna azione in programma</p></div>'}

function renderProspects(){const q=document.getElementById('searchInput').value.toLowerCase(),fs=document.getElementById('filterSettore').value,fst=document.getElementById('filterStato').value;
let f=D.prospects.filter(p=>{if(q&&!p.name.toLowerCase().includes(q)&&!(p.contatto||'').toLowerCase().includes(q))return false;if(fs&&p.settore!==fs)return false;if(fst&&p.stato!==fst)return false;return true});
const l=document.getElementById('prospectList');
if(!f.length){l.innerHTML=`<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><p>${!D.prospects.length?'Nessun prospect. Premi <strong>Nuovo</strong> per iniziare.':'Nessun risultato.'}</p></div>`;return}
l.innerHTML=f.map(p=>`<div class="p-card st-${p.stato}" onclick="toggle(this)"><div class="p-card-name">${p.name}</div><div class="p-card-tags">${p.settore?`<span class="tag tag-sector">${p.settore}</span>`:''}${p.zona?`<span class="tag tag-zone">${p.zona}</span>`:''}<span class="tag tag-status ts-${p.stato}">${ST[p.stato]?.l||p.stato}</span></div><div class="p-card-detail">${p.contatto?`<div class="field"><span class="field-k">Contatto</span><span class="field-v">${p.contatto}</span></div>`:''}${p.tel?`<div class="field"><span class="field-k">Telefono</span><span class="field-v"><a href="https://wa.me/${p.tel.replace(/[^0-9+]/g,'')}">${p.tel}</a></span></div>`:''}${p.ig?`<div class="field"><span class="field-k">Instagram</span><span class="field-v"><a href="https://instagram.com/${p.ig.replace('@','')}">${p.ig}</a></span></div>`:''}${p.email?`<div class="field"><span class="field-k">Email</span><span class="field-v">${p.email}</span></div>`:''}${p.dolore?`<div class="field"><span class="field-k">Dolore</span><span class="field-v">${p.dolore}</span></div>`:''}${p.azione?`<div class="field"><span class="field-k">Azione</span><span class="field-v" style="color:var(--accent2);font-weight:600">${p.azione}</span></div>`:''}${p.note?`<div class="field"><span class="field-k">Note</span><span class="field-v">${p.note}</span></div>`:''}${p.timeline?.length?`<div class="tl">${p.timeline.map(t=>`<div class="tl-item"><span class="tl-date">${t.date}</span><span class="tl-text">${t.text}</span></div>`).join('')}</div>`:''}<div class="p-card-actions"><button class="btn btn-primary btn-sm" onclick="event.stopPropagation();openModal('${p.id}')">Modifica</button><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();advance('${p.id}')">Avanza stato</button></div></div></div>`).join('')}
function toggle(el){el.classList.toggle('open')}
function populateFilters(){const s=[...new Set(D.prospects.map(p=>p.settore).filter(Boolean))];document.getElementById('filterSettore').innerHTML='<option value="">Tutti i settori</option>'+s.map(x=>`<option>${x}</option>`).join('')}
document.getElementById('searchInput').addEventListener('input',renderProspects);document.getElementById('filterSettore').addEventListener('change',renderProspects);document.getElementById('filterStato').addEventListener('change',renderProspects);

function openModal(id){const m=document.getElementById('modal'),e=!!id;document.getElementById('modalTitle').textContent=e?'Modifica Prospect':'Nuovo Prospect';document.getElementById('btnDelete').style.display=e?'inline-flex':'none';
if(e){const p=D.prospects.find(x=>x.id===id);if(!p)return;document.getElementById('editId').value=p.id;const map={fName:'name',fContatto:'contatto',fTel:'tel',fIg:'ig',fEmail:'email',fDolore:'dolore',fAzione:'azione',fNote:'note'};Object.entries(map).forEach(([f,k])=>document.getElementById(f).value=p[k]||'');document.getElementById('fSettore').value=p.settore||'';document.getElementById('fZona').value=p.zona||'';document.getElementById('fStato').value=p.stato||'da_contattare'}
else{document.getElementById('editId').value='';['fName','fContatto','fTel','fIg','fEmail','fDolore','fAzione','fNote'].forEach(i=>document.getElementById(i).value='');document.getElementById('fSettore').value='';document.getElementById('fZona').value='';document.getElementById('fStato').value='da_contattare'}m.classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function saveProspect(){const n=document.getElementById('fName').value.trim();if(!n)return alert("Inserisci il nome");const eId=document.getElementById('editId').value,now=new Date().toLocaleDateString('it-IT');const o={name:n,settore:document.getElementById('fSettore').value,zona:document.getElementById('fZona').value,contatto:document.getElementById('fContatto').value.trim(),tel:document.getElementById('fTel').value.trim(),ig:document.getElementById('fIg').value.trim(),email:document.getElementById('fEmail').value.trim(),stato:document.getElementById('fStato').value,dolore:document.getElementById('fDolore').value.trim(),azione:document.getElementById('fAzione').value.trim(),note:document.getElementById('fNote').value.trim()};
if(eId){const idx=D.prospects.findIndex(x=>x.id===eId);if(idx>=0){const old=D.prospects[idx];if(old.stato!==o.stato){if(!old.timeline)old.timeline=[];old.timeline.unshift({date:now,text:`${ST[old.stato]?.l} → ${ST[o.stato]?.l}`})}D.prospects[idx]={...old,...o}}}
else{o.id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);o.createdAt=now;o.timeline=[{date:now,text:'Aggiunto'}];D.prospects.push(o)}save();closeModal();renderAll()}
function deleteProspect(){const id=document.getElementById('editId').value;if(!id||!confirm('Eliminare?'))return;D.prospects=D.prospects.filter(x=>x.id!==id);save();closeModal();renderAll()}
function advance(id){const ord=['da_contattare','messaggio_inviato','risposta_ricevuta','call_fissata','proposta_inviata','cliente'];const p=D.prospects.find(x=>x.id===id);if(!p)return;const i=ord.indexOf(p.stato);if(i<0||i>=ord.length-1)return;const now=new Date().toLocaleDateString('it-IT'),ns=ord[i+1];if(!p.timeline)p.timeline=[];p.timeline.unshift({date:now,text:`${ST[p.stato]?.l} → ${ST[ns]?.l}`});p.stato=ns;save();renderAll()}

function renderTpl(){document.getElementById('templatesList').innerHTML='<div style="font-size:.88rem;font-weight:700;margin-bottom:.8rem">Template messaggi — A/B test</div>'+TPL.map((t,i)=>`<div class="tpl-card"><div class="tpl-title">${t.t}</div><div class="tpl-sub">${t.s}</div><div class="tpl-body">${t.b}</div><span class="tpl-copy" id="cp${i}" onclick="copyTpl(${i})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copia</span></div>`).join('')}
function copyTpl(i){navigator.clipboard.writeText(TPL[i].b).then(()=>{const el=document.getElementById('cp'+i);el.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><polyline points="20 6 9 17 4 12"/></svg>Copiato';el.classList.add('ok');setTimeout(()=>{el.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copia';el.classList.remove('ok')},2000)})}

function renderTodos(){const l=document.getElementById('todoList');if(!D.todos.length){l.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="36" height="36"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><p>Nessuna azione in lista</p></div>';return}
l.innerHTML=[...D.todos].sort((a,b)=>(a.done?1:0)-(b.done?1:0)).map(t=>`<div class="todo"><div class="todo-box ${t.done?'done':''}" onclick="togTodo('${t.id}')"></div><div class="todo-body"><div class="todo-txt ${t.done?'done':''}">${t.text}</div><div class="todo-date">${t.date}</div></div><button class="btn btn-ghost btn-sm" onclick="rmTodo('${t.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`).join('')}
function addTodo(){const t=prompt("Descrivi l'azione:");if(!t)return;D.todos.push({id:Date.now().toString(36),text:t,date:new Date().toLocaleDateString('it-IT'),done:false});save();renderTodos()}
function togTodo(id){const t=D.todos.find(x=>x.id===id);if(t)t.done=!t.done;save();renderTodos()}
function rmTodo(id){D.todos=D.todos.filter(x=>x.id!==id);save();renderTodos()}

function renderAll(){renderDash();populateFilters();renderProspects();renderTpl();renderTodos()}
load();syncUI();renderAll();
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal()});
document.getElementById('settingsModal').addEventListener('click',e=>{if(e.target===document.getElementById('settingsModal'))closeSettings()});
</script>
</body>
</html>
